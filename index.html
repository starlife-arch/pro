<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starlife Assets</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Starlife Assets</h1>
    <div class="topbar-controls">
      <label>
        Active User
        <select id="activeUser"></select>
      </label>
      <div id="balanceCard" class="balance-card"></div>
    </div>
  </header>

  <nav class="tabs">
    <button data-tab="assets" class="active">Assets</button>
    <button data-tab="my-assets">My Assets</button>
    <button data-tab="marketplace">Marketplace</button>
    <button data-tab="receipts">Receipts</button>
    <button data-tab="contracts">Contracts</button>
    <button data-tab="admin">Admin</button>
  </nav>

  <main>
    <section id="assets" class="tab-panel active">
      <h2>Assets</h2>
      <div class="filters">
        <select id="assetTypeFilter"><option value="all">All Types</option></select>
        <input id="assetLocationFilter" placeholder="Filter by location" />
        <input id="assetPriceFilter" type="number" min="0" placeholder="Max full price" />
      </div>
      <div id="assetsGrid" class="grid"></div>
    </section>

    <section id="my-assets" class="tab-panel">
      <h2>My Assets</h2>
      <div id="myAssetsGrid" class="grid"></div>
    </section>

    <section id="marketplace" class="tab-panel">
      <h2>User Marketplace</h2>
      <div id="marketGrid" class="grid"></div>
    </section>

    <section id="receipts" class="tab-panel">
      <h2>Receipts</h2>
      <div id="receiptList" class="list"></div>
    </section>

    <section id="contracts" class="tab-panel">
      <h2>Contracts</h2>
      <div id="contractList" class="list"></div>
    </section>

    <section id="admin" class="tab-panel">
      <h2>Admin</h2>
      <form id="assetForm" class="card form-grid">
        <input type="hidden" id="assetId" />
        <label>Name <input id="assetName" required /></label>
        <label>Type
          <select id="assetType" required>
            <option>house</option><option>phone</option><option>car</option><option>electronics</option><option>other</option>
          </select>
        </label>
        <label>Description <textarea id="assetDescription" rows="2"></textarea></label>
        <label>Location <input id="assetLocation" /></label>
        <label>Origin Location <input id="assetOrigin" /></label>
        <label>Weight Category
          <select id="assetWeight"><option>small</option><option>medium</option><option>large</option></select>
        </label>
        <label>Full Price <input id="assetFullPrice" type="number" min="1" required /></label>
        <label>Rent Price <input id="assetRentPrice" type="number" min="1" required /></label>
        <label>Payment Interval
          <select id="assetInterval"><option>daily</option><option>weekly</option><option>monthly</option></select>
        </label>
        <label>Ownership Type
          <select id="assetOwnershipType"><option value="rent-only">rent-only</option><option value="rent-to-own">rent-to-own</option><option value="full-purchase">full-purchase</option></select>
        </label>
        <label>Physical Asset?
          <select id="assetPhysical"><option value="yes">yes</option><option value="no">no</option></select>
        </label>
        <label>VIP Only?
          <select id="assetVip"><option value="no">no</option><option value="yes">yes</option></select>
        </label>
        <label>Asset Images (max 3)
          <input id="assetImagesInput" type="file" accept="image/*" multiple />
        </label>
        <div>
          <small>Preview</small>
          <div id="assetImagePreview" class="image-preview-wrap"></div>
        </div>
        <div class="actions">
          <button type="submit">Save Asset</button>
          <button type="button" id="clearAssetForm">Clear</button>
        </div>
      </form>
      <h3>Manage Assets</h3>
      <div id="adminAssetList" class="list"></div>
      <h3>Admin Marketplace Overrides</h3>
      <div id="adminListingList" class="list"></div>
    </section>
  </main>

  <dialog id="assetDialog">
    <article class="modal-content" id="assetDetailContent"></article>
  </dialog>

  <dialog id="signatureDialog">
    <article class="modal-content">
      <h3>Sign Contract</h3>
      <p id="signatureContractInfo"></p>
      <canvas id="signaturePad" width="420" height="180"></canvas>
      <div class="actions">
        <button id="clearSignature">Clear</button>
        <button id="saveSignature">Save Signature</button>
        <button id="closeSignature">Close</button>
      </div>
    </article>
  </dialog>

  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
